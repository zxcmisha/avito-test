name: Проверочные тесты

on:
  - workflow_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    if: github.actor != 'github-classroom[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show docker versions
        run: |
          docker --version
          docker compose version || docker-compose --version

      - name: Start services
        run: |
          if docker compose version; then
            docker compose up -d --build
          else
            docker-compose up -d --build
          fi

      - name: Wait for service on :8080
        shell: bash
        run: |
          set -euo pipefail

          URL="http://localhost:8080/"
          echo "Waiting for ${URL} ..."

          for i in {1..120}; do
            if curl -sS "$URL" >/dev/null 2>&1; then
              echo "Service is up!"
              exit 0
            fi
            sleep 1
          done

          echo "Service did not become ready in time"
          if docker compose version; then
            docker compose ps
            docker compose logs --no-color --tail=200
          else
            docker-compose ps
            docker-compose logs --no-color --tail=200
          fi
          exit 1

      - name: Run e2e and compute score (fallback=0)
        id: compute_score
        shell: bash
        env:
          BASE_URL: "localhost:8080"
        run: |
          set +e

          sudo apt-get update -qq
          sudo apt-get install -y jq

          wget https://github.com/Avito-Internships/agoge/releases/latest/download/agoge-cli
          chmod +x agoge-cli

          echo "Running e2e..."
          ./agoge-cli e2e-tests \
            --task=2026-room-booking \
            --json \
            --base-url="${BASE_URL}" \
            2>&1 | tee e2e-output.txt > result.json
          TEST_EXIT=${PIPESTATUS[0]}

          SCORE=0
          REASON=""

          if jq -e . >/dev/null 2>&1 < result.json; then
            PARSED_SCORE="$(jq -r '.score // empty' result.json 2>/dev/null)"
            if [[ "$PARSED_SCORE" =~ ^[0-5]$ ]]; then
              SCORE="$PARSED_SCORE"
            else
              REASON="JSON valid, but .score missing or not in 0..5"
            fi
          else
            REASON="Invalid JSON output"
          fi

          if [[ "$TEST_EXIT" -ne 0 ]]; then
            SCORE=0
            if [[ -n "$REASON" ]]; then
              REASON="$REASON; tests exited with code $TEST_EXIT"
            else
              REASON="Tests exited with code $TEST_EXIT"
            fi
          fi

          echo "SCORE=$SCORE" >> "$GITHUB_ENV"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

          {
            echo "## E2E Autograding"
            echo ""
            echo "- **Score:** \`${SCORE}/5\`"
            if [[ -n "$REASON" ]]; then
              echo "- **Reason:** ${REASON}"
            fi
            echo ""
            echo "### Artifacts"
            echo "- \`result.json\`"
            echo "- \`e2e-output.txt\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ -n "$REASON" ]]; then
            echo "::warning title=Autograding fallback used::Score set to 0. Reason: ${REASON}"
          else
            echo "::notice title=Autograding::Score ${SCORE}/5"
          fi

          exit 0

      - name: Autograde - Point 1
        if: always()
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "E2E score: point 1"
          command: bash -lc '[[ "${SCORE:-0}" -ge 1 ]]'
          timeout: 5
          max-score: 1

      - name: Autograde - Point 2
        if: always()
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "E2E score: point 2"
          command: bash -lc '[[ "${SCORE:-0}" -ge 2 ]]'
          timeout: 5
          max-score: 1

      - name: Autograde - Point 3
        if: always()
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "E2E score: point 3"
          command: bash -lc '[[ "${SCORE:-0}" -ge 3 ]]'
          timeout: 5
          max-score: 1

      - name: Autograde - Point 4
        if: always()
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "E2E score: point 4"
          command: bash -lc '[[ "${SCORE:-0}" -ge 4 ]]'
          timeout: 5
          max-score: 1

      - name: Autograde - Point 5
        if: always()
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "E2E score: point 5"
          command: bash -lc '[[ "${SCORE:-0}" -ge 5 ]]'
          timeout: 5
          max-score: 1

      # 3) Artifacts
      - name: Upload autograding artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-autograding
          path: |
            result.json
            e2e-output.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Stop services (always)
        if: always()
        run: |
          if docker compose version; then
            docker compose down -v
          else
            docker-compose down -v
          fi